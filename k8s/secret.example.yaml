# EXAMPLE ONLY — do not commit real secrets. Create the real Secret out-of-band:
#
#   kubectl create secret generic kwa-secrets \
#     --from-literal=DATABASE_URL='postgres://kwa_app:****@db-host:5432/kwa' \
#     --from-literal=JWT_SECRET='<32+ random bytes>' \
#     --from-literal=SMS_GATEWAY_URL='https://sms.gateway.gov.in/send' \
#     --from-literal=SMS_GATEWAY_API_KEY='****'
#
# (or use a sealed-secrets / external-secrets operator instead of raw Secrets.)
apiVersion: v1
kind: Secret
metadata:
  name: kwa-secrets
  labels: { app: kwa-api }
type: Opaque
stringData:
  DATABASE_URL: "postgres://kwa_app:CHANGE_ME@db-host:5432/kwa"
  JWT_SECRET: "CHANGE_ME_TO_32_PLUS_RANDOM_BYTES"
  SMS_GATEWAY_URL: "https://sms.gateway.example/send"
  SMS_GATEWAY_API_KEY: "CHANGE_ME"
  # S3 credentials (omit and use an IRSA / instance role where possible)
  S3_ACCESS_KEY_ID: "CHANGE_ME"
  S3_SECRET_ACCESS_KEY: "CHANGE_ME"
