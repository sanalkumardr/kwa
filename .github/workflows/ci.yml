name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend — typecheck & integration tests
    runs-on: ubuntu-latest

    # Postgres + PostGIS, same image as docker-compose, so CI matches local.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      # tests reset the kwa schema inside this DB; kwa_app owns it (non-superuser
      # → FORCE ROW LEVEL SECURITY binds, so RLS tests are meaningful)
      TEST_DATABASE_URL: postgres://kwa_app:kwa_app@localhost:5432/kwa_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Provision kwa_app role + kwa_test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE kwa_app LOGIN PASSWORD 'kwa_app';
          CREATE DATABASE kwa_test OWNER kwa_app;
          SQL
          psql -h localhost -U postgres -d kwa_test -v ON_ERROR_STOP=1 <<'SQL'
          CREATE EXTENSION IF NOT EXISTS postgis;
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          GRANT ALL ON SCHEMA public TO kwa_app;
          SQL

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Typecheck
        working-directory: backend
        run: npx tsc --noEmit -p tsconfig.json

      - name: Integration tests
        working-directory: backend
        run: npm test
