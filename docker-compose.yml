services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - kwa_pgdata:/var/lib/postgresql/data
      # superuser-time bootstrap: create kwa_app role + kwa/kwa_test dbs + extensions
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot: applies migrations 001/002/003 to the kwa db as the kwa_app role
  # (so objects are owned by a non-superuser and FORCE RLS actually binds).
  migrate:
    image: postgis/postgis:16-3.4
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: kwa_app
    volumes:
      - ./migrations:/migrations:ro
      - ./db/run_migrations.sh:/run_migrations.sh:ro
    entrypoint: ["bash", "/run_migrations.sh"]
    restart: "no"

  api:
    build:
      context: ./backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://kwa_app:kwa_app@db:5432/kwa
      TEST_DATABASE_URL: postgres://kwa_app:kwa_app@db:5432/kwa_test
      JWT_SECRET: dev-secret-change-me
      UPLOAD_DIR: /data/uploads
      PORT: "3000"
      # local dev only: return the OTP in the response so the app pre-fills it
      # (RUNNING.md relies on this; must stay false/unset in prod)
      OTP_DEV_ECHO: "true"
    ports:
      - "3000:3000"
    volumes:
      - kwa_uploads:/data/uploads
    healthcheck:
      test:
        ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  kwa_pgdata:
  kwa_uploads:
